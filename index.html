<html lang="th">
<head>
<meta charset="UTF-8">

<title>ระบบค้นหาเวชระเบียน</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>

    --teal: #0d9488; --teal-light: #14b8a6; --teal-dark: #0f766e;
    --mint: #ccfbf1; --slate: #1e293b; --slate-soft: #64748b;
    --gray-light: #f1f5f9; --gray-border: #e2e8f0; --white: #ffffff;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.07); --shadow-md: 0 4px 16px rgba(13,148,136,0.10);
    --shadow-lg: 0 10px 40px rgba(13,148,136,0.15); --radius: 16px; --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', sans-serif; background: linear-gradient(135deg, #f0fdf9, #e6f7f5, #f0fdf4); min-height: 100vh; color: var(--slate); }
  header {
    background: linear-gradient(135deg, var(--teal-dark), var(--teal), var(--teal-light));
    padding: 28px 40px 24px; display: flex; align-items: center; gap: 18px;
    box-shadow: 0 4px 24px rgba(13,148,136,0.25); position: relative; overflow: hidden;
  }
  header::before { content:''; position:absolute; top:-40px; right:-40px; width:200px; height:200px; border-radius:50%; background:rgba(255,255,255,0.07); }
  .header-icon { width:52px; height:52px; background:rgba(255,255,255,0.18); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:26px; flex-shrink:0; }
  .header-text h1 { color:white; font-size:22px; font-weight:700; }
  .header-text p { color:rgba(255,255,255,0.78); font-size:13px; margin-top:2px; }
  .header-badge { margin-left:auto; background:rgba(255,255,255,0.18); color:white; border-radius:20px; padding:6px 16px; font-size:13px; font-weight:500; border:1px solid rgba(255,255,255,0.2); z-index:1; }
  .api-status { margin-left:8px; font-size:12px; padding:4px 10px; border-radius:10px; }
  .api-loading { background:rgba(255,200,0,0.2); color:#fde68a; }
  .api-ok { background:rgba(0,255,128,0.15); color:#6ee7b7; }
  .api-err { background:rgba(255,100,100,0.2); color:#fca5a5; }
  main { max-width:860px; margin:0 auto; padding:36px 24px 60px; }
  .search-card { background:var(--white); border-radius:var(--radius); padding:30px 28px 24px; box-shadow:var(--shadow-md); margin-bottom:28px; border:1px solid rgba(13,148,136,0.08); }
  .search-label { font-size:13px; font-weight:600; color:var(--teal-dark); margin-bottom:10px; letter-spacing:0.4px; text-transform:uppercase; display:flex; align-items:center; gap:7px; }
  .search-row { display:flex; gap:12px; align-items:flex-start; }
  .input-wrap { flex:1; position:relative; }
  .input-wrap input { width:100%; padding:13px 18px 13px 44px; border:2px solid var(--gray-border); border-radius:var(--radius-sm); font-family:inherit; font-size:16px; color:var(--slate); background:var(--gray-light); transition:all 0.2s; outline:none; }
  .input-wrap input:focus { border-color:var(--teal); background:white; box-shadow:0 0 0 4px rgba(13,148,136,0.10); }
  .input-wrap input::placeholder { color:#94a3b8; }
  .input-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--teal); font-size:18px; pointer-events:none; }
  .clear-btn { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:#94a3b8; cursor:pointer; font-size:16px; padding:4px; display:none; }
  .clear-btn:hover { color:var(--slate); }
  .search-btn { padding:13px 26px; background:linear-gradient(135deg, var(--teal), var(--teal-light)); color:white; border:none; border-radius:var(--radius-sm); font-family:inherit; font-size:15px; font-weight:600; cursor:pointer; transition:all 0.2s; white-space:nowrap; box-shadow:0 4px 12px rgba(13,148,136,0.3); display:flex; align-items:center; gap:8px; }
  .search-btn:hover { transform:translateY(-1px); box-shadow:0 6px 18px rgba(13,148,136,0.4); }
  .autocomplete-list { position:absolute; top:calc(100% + 6px); left:0; right:0; background:white; border-radius:var(--radius-sm); box-shadow:var(--shadow-lg); border:1px solid var(--gray-border); z-index:100; overflow:hidden; max-height:260px; overflow-y:auto; animation:dropIn 0.15s ease; }
  @keyframes dropIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .autocomplete-list::-webkit-scrollbar { width:6px; }
  .autocomplete-list::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px; }
  .ac-item { display:flex; align-items:center; gap:12px; padding:11px 16px; cursor:pointer; transition:background 0.12s; border-bottom:1px solid #f1f5f9; }
  .ac-item:last-child { border-bottom:none; }
  .ac-item:hover, .ac-item.selected { background:var(--mint); }
  .ac-avatar { width:34px; height:34px; background:linear-gradient(135deg, var(--teal), var(--teal-light)); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:14px; font-weight:700; flex-shrink:0; }
  .ac-name { font-size:14px; font-weight:500; color:var(--slate); }
  .ac-phone { font-size:12px; color:var(--slate-soft); margin-top:1px; }
  .ac-imgs { margin-left:auto; background:var(--mint); color:var(--teal-dark); border-radius:8px; padding:2px 8px; font-size:11px; font-weight:600; }
  .result-card { background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow-md); overflow:hidden; border:1px solid rgba(13,148,136,0.08); animation:slideUp 0.25s ease; }
  @keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .patient-header { background:linear-gradient(135deg, #f0fdf9, var(--mint)); padding:24px 28px; display:flex; align-items:center; gap:18px; border-bottom:1px solid rgba(13,148,136,0.12); }
  .patient-avatar { width:60px; height:60px; background:linear-gradient(135deg, var(--teal), var(--teal-light)); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:22px; font-weight:800; flex-shrink:0; box-shadow:0 4px 12px rgba(13,148,136,0.3); }
  .patient-name { font-size:20px; font-weight:700; color:var(--slate); }
  .patient-phone { display:flex; align-items:center; gap:6px; margin-top:6px; font-size:15px; color:var(--slate-soft); }
  .img-count-badge { background:linear-gradient(135deg, var(--teal), var(--teal-light)); color:white; border-radius:12px; padding:8px 18px; font-size:13px; font-weight:600; text-align:center; box-shadow:0 3px 8px rgba(13,148,136,0.25); flex-shrink:0; }
  .img-count-badge .num { font-size:22px; font-weight:800; display:block; line-height:1; }
  .images-section { padding:24px 28px; }
  .section-title { font-size:13px; font-weight:600; color:var(--teal-dark); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
  .section-title::after { content:''; flex:1; height:1px; background:linear-gradient(to right, rgba(13,148,136,0.2), transparent); }
  .image-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:14px; }
  .img-item { border-radius:var(--radius-sm); overflow:hidden; aspect-ratio:3/4; background:var(--gray-light); cursor:pointer; transition:all 0.2s; position:relative; border:2px solid transparent; box-shadow:var(--shadow-sm); }
  .img-item:hover { transform:translateY(-3px) scale(1.02); box-shadow:var(--shadow-md); border-color:var(--teal-light); }
  .img-item img { width:100%; height:100%; object-fit:cover; display:block; transition:opacity 0.3s; }
  .img-overlay { position:absolute; inset:0; background:linear-gradient(to bottom, transparent 50%, rgba(15,118,110,0.75) 100%); opacity:0; transition:opacity 0.2s; display:flex; align-items:flex-end; justify-content:center; padding-bottom:10px; }
  .img-item:hover .img-overlay { opacity:1; }
  .img-overlay span { color:white; font-size:12px; background:rgba(0,0,0,0.3); border-radius:6px; padding:2px 8px; }
  .img-label { position:absolute; top:8px; left:8px; background:rgba(13,148,136,0.85); color:white; border-radius:6px; padding:2px 7px; font-size:10px; font-weight:600; }
  .img-loading { width:100%; height:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; color:#94a3b8; font-size:11px; }
  .img-spinner { width:24px; height:24px; border:2px solid #e2e8f0; border-top-color:var(--teal); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .img-error-box { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; color:#94a3b8; font-size:11px; text-align:center; padding:10px; background:#f8fafc; }
  .no-result { text-align:center; padding:60px 20px; color:var(--slate-soft); }
  .no-result-icon { font-size:48px; margin-bottom:14px; }
  .no-result h3 { font-size:18px; font-weight:600; color:#334155; margin-bottom:6px; }
  .hint-text { text-align:center; color:var(--slate-soft); font-size:14px; padding:40px 0; display:flex; flex-direction:column; align-items:center; gap:12px; }
  .hint-icon { font-size:44px; opacity:0.5; }
  .open-drive-btn { display:inline-flex; align-items:center; gap:8px; background:none; border:2px solid var(--teal); color:var(--teal); border-radius:8px; padding:9px 20px; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.15s; margin-top:16px; }
  .open-drive-btn:hover { background:var(--teal); color:white; }
  .db-update-area { display:flex; align-items:center; gap:8px; margin-left:12px; z-index:1; }
  .db-update-btn { background:rgba(255,255,255,0.18); color:white; border:1px solid rgba(255,255,255,0.3); border-radius:20px; padding:6px 14px; font-family:inherit; font-size:12px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; transition:all 0.2s; white-space:nowrap; }
  .db-update-btn:hover { background:rgba(255,255,255,0.28); border-color:rgba(255,255,255,0.5); }
  .db-confirm-btn { background:rgba(255,220,50,0.85); color:#1e293b; border:1px solid rgba(255,220,50,0.6); border-radius:20px; padding:6px 14px; font-family:inherit; font-size:12px; font-weight:700; cursor:pointer; display:none; align-items:center; gap:6px; transition:all 0.2s; white-space:nowrap; animation:fadeIn 0.2s ease; }
  .db-confirm-btn:hover { background:rgba(255,230,80,1); }
  @keyframes fadeIn { from{opacity:0;transform:scale(0.92)} to{opacity:1;transform:scale(1)} }
  .db-filename { color:rgba(255,255,255,0.7); font-size:11px; max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .db-toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%); background:#1e293b; color:white; border-radius:12px; padding:12px 22px; font-size:14px; font-weight:500; box-shadow:0 6px 24px rgba(0,0,0,0.25); z-index:9999; display:none; animation:toastIn 0.25s ease; }
  @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  @media(max-width:600px) {
    header { padding:20px; } main { padding:20px 14px 40px; }
    .search-row { flex-direction:column; } .search-btn { width:100%; justify-content:center; }
    .image-grid { grid-template-columns:repeat(2,1fr); }
    .db-update-area { margin-left:6px; } .db-filename { display:none; }
  }
</style>

<header>
  <div class="header-icon">🦷</div>
  <div class="header-text">
    <h1>ระบบค้นหาเวชระเบียน</h1>
    <p>ค้นหาข้อมูลผู้ป่วยและรูปลายมือแพทย์</p>
  </div>
  <div class="header-badge" id="totalBadge">— ราย</div>
  <div class="db-update-area" id="dbUpdateArea">
    <button class="db-confirm-btn" id="dbConfirmBtn" onclick="confirmDbUpdate()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      ยืนยันอัปเดต
    </button>
    <span class="db-filename" id="dbFilename"></span>
    <button class="db-update-btn" id="dbUpdateBtn" onclick="triggerDbBrowse()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      อัปเดตฐานข้อมูล
    </button>
  </div>
  <input type="file" id="dbFileInput" accept=".db" style="display:none" onchange="handleDbFile(this)">
  <button onclick="setupToken()" style="background:rgba(255,255,255,0.15);color:white;border:1px solid rgba(255,255,255,0.3);border-radius:20px;padding:5px 12px;font-family:inherit;font-size:12px;cursor:pointer;margin-left:6px;z-index:1" id="tokenBtn" title="ตั้งค่า GitHub Token">🔑 Token</button>
  <div class="api-status api-loading" id="apiStatus">⏳ กำลังเชื่อมต่อ Drive...</div>
  <div class="db-toast" id="dbToast"></div>
</header>

<main>
  <div class="search-card">
    <div class="search-label">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      ค้นหาผู้ป่วย
    </div>
    <div class="search-row">
      <div class="input-wrap" id="inputWrap">
        <span class="input-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </span>
        <input type="text" id="searchInput" placeholder="พิมพ์ชื่อผู้ป่วย..." autocomplete="off" spellcheck="false">
        <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
        <div class="autocomplete-list" id="acList" style="display:none"></div>
      </div>
      <button class="search-btn" onclick="doSearch()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        ค้นหา
      </button>
    </div>
  </div>
  <div id="resultArea">
    <div class="hint-text"><div class="hint-icon">🔍</div><div>พิมพ์ชื่อผู้ป่วยเพื่อค้นหาข้อมูล</div></div>
  </div>
</main>

  return localStorage.getItem(TOKEN_KEY) || '';
}

let _tokenResolve = null;

function promptForToken() {
  // สำหรับ async call ใน savePatientsToStorage — เปิด modal แล้วรอ
  return new Promise(resolve => {
    _tokenResolve = resolve;
    openTokenModal();
  });
}

function openTokenModal() {
  const modal = document.getElementById('tokenModal');
  const input = document.getElementById('tokenInput');
  input.value = getToken();
  modal.style.display = 'flex';
  setTimeout(() => input.focus(), 100);
}

function closeTokenModal() {
  document.getElementById('tokenModal').style.display = 'none';
  if (_tokenResolve) { _tokenResolve(getToken()); _tokenResolve = null; }
}

function saveToken() {
  const t = document.getElementById('tokenInput').value.trim();
  if (t) {
    localStorage.setItem(TOKEN_KEY, t);
    document.getElementById('tokenModal').style.display = 'none';
    showToast('✅ บันทึก Token เรียบร้อย กำลังโหลดข้อมูล...');
    loadPatientsFromGist().then(() => {
      showToast('✅ โหลดข้อมูลจาก Gist เรียบร้อย');
    });
    if (_tokenResolve) { _tokenResolve(t); _tokenResolve = null; }
  } else {
    showToast('❌ กรุณาใส่ Token ก่อน');
  }
}

// เริ่มต้นด้วย base data ก่อน แล้วจะโหลดจาก Gist ทับทีหลัง
let PATIENTS = PATIENTS_BASE.slice();

async function loadPatientsFromGist() {
  const token = getToken();
  if (!token) return; // ยังไม่มี token ใช้ base data ไปก่อน
  try {
    const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      headers: { 'Authorization': `token ${token}` }
    });
    if (!res.ok) throw new Error('Gist load failed: ' + res.status);
    const data = await res.json();
    const raw = data.files[GIST_FILENAME]?.content;
    if (!raw) return;
    const parsed = JSON.parse(raw);
    if (Array.isArray(parsed) && parsed.length >= PATIENTS_BASE.length) {
      PATIENTS = parsed;
      document.getElementById('totalBadge').textContent = PATIENTS.length + ' ราย';
    }
  } catch(e) {
    console.warn('โหลดจาก Gist ไม่ได้:', e.message);
  }
}

async function savePatientsToStorage() {
  let token = getToken();
  if (!token) token = await promptForToken();
  if (!token) throw new Error('ไม่มี token');
  const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
    method: 'PATCH',
    headers: {
      'Authorization': `token ${token}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      files: { [GIST_FILENAME]: { content: JSON.stringify(PATIENTS) } }
    })
  });
  if (!res.ok) {
    // token อาจหมดอายุ ให้ใส่ใหม่
    localStorage.removeItem(TOKEN_KEY);
    throw new Error('Gist save failed ' + res.status + ' — กรุณา refresh แล้วใส่ token ใหม่');
  }
}

// โหลดจาก Gist ตอนเปิดหน้า (ถ้ามี token แล้ว)
loadPatientsFromGist();

document.getElementById('totalBadge').textContent = PATIENTS.length + ' ราย';

// Parse filename like "img_123_20260407_210600.jpg" or "draw_123_20260407_105443.png"
// returns patient id (number) or null
function parsePatientId(filename) {
  const m = filename.match(/^(?:img|draw)_(\d+)_/);
  return m ? parseInt(m[1]) : null;
}

// Load ALL files from Drive folder (handles pagination)
async function loadDriveFiles() {
  const status = document.getElementById('apiStatus');
  let allFiles = [];
  let pageToken = '';
  patientImages = {};
  try {
    do {
      const url = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent("'" + FOLDER_ID + "' in parents")}&fields=nextPageToken,files(id,name)&pageSize=1000${pageToken ? '&pageToken=' + pageToken : ''}&key=${API_KEY}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('API error ' + res.status);
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      (data.files || []).forEach(f => {
        fileMap[f.name] = f.id;
        // Build per-patient image list from filename
        const pid = parsePatientId(f.name);
        if (pid !== null) {
          if (!patientImages[pid]) patientImages[pid] = [];
          patientImages[pid].push(f.name);
        }
      });
      allFiles.push(...(data.files || []));
      pageToken = data.nextPageToken || '';
    } while (pageToken);

    // Sort images per patient by timestamp (embedded in filename)
    for (const pid in patientImages) {
      patientImages[pid].sort();
    }

    apiReady = true;
    status.className = 'api-status api-ok';
    status.textContent = `✅ พร้อม (${allFiles.length} ไฟล์)`;

    // Also update autocomplete badge counts
    // (no-op: badges are computed live from patientImages on render)
  } catch(e) {
    status.className = 'api-status api-err';
    status.textContent = '❌ Drive: ' + e.message;
    console.error(e);
  }
}

loadDriveFiles();

function getPatientImages(patient) {
  return patientImages[patient.id] || [];
}

function getDriveViewUrl(filename) {
  const id = fileMap[filename];
  if (id) return `https://drive.google.com/file/d/${id}/view`;
  return null;
}

function getDriveThumbnailUrl(filename) {
  const id = fileMap[filename];
  if (id) return `https://www.googleapis.com/drive/v3/files/${id}?alt=media&key=${API_KEY}`;
  return null;
}

function getFirstChar(name) {
  const clean = name.replace(/^(นาย|นาง|น\.ส\.|นางสาว|ด\.ช\.|ด\.ญ\.|เด็กหญิง|เด็กชาย|Miss|Mr\.|Mrs\.)\s*/, '');
  return clean.charAt(0) || name.charAt(0);
}

// Autocomplete
const searchInput = document.getElementById('searchInput');
const acList = document.getElementById('acList');
const clearBtn = document.getElementById('clearBtn');
let acSelected = -1;

searchInput.addEventListener('input', function() {
  const val = this.value.trim();
  clearBtn.style.display = val ? 'block' : 'none';
  if (val.length < 1) { acList.style.display = 'none'; return; }
  const matches = PATIENTS.filter(p => p.name.includes(val)).slice(0, 8);
  if (!matches.length) { acList.style.display = 'none'; return; }
  acSelected = -1;
  acList.innerHTML = matches.map((p, i) => {
    const imgs = getPatientImages(p);
    return `
    <div class="ac-item" data-id="${p.id}" onmousedown="selectPatientById(${p.id})">
      <div class="ac-avatar">${getFirstChar(p.name)}</div>
      <div>
        <div class="ac-name">${highlight(p.name, val)}</div>
        ${p.phone ? `<div class="ac-phone">📞 ${p.phone}</div>` : ''}
      </div>
      ${imgs.length ? `<div class="ac-imgs">📷 ${imgs.length}</div>` : ''}
    </div>
  `}).join('');
  acList.style.display = 'block';
});

function highlight(text, q) {
  const i = text.indexOf(q);
  if (i < 0) return text;
  return text.slice(0,i) + `<mark style="background:#ccfbf1;color:#0f766e;border-radius:3px;padding:0 2px">${text.slice(i, i+q.length)}</mark>` + text.slice(i+q.length);
}

searchInput.addEventListener('keydown', function(e) {
  const items = acList.querySelectorAll('.ac-item');
  if (e.key === 'ArrowDown') { e.preventDefault(); acSelected = Math.min(acSelected+1, items.length-1); items.forEach((el,i) => el.classList.toggle('selected', i===acSelected)); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); acSelected = Math.max(acSelected-1, -1); items.forEach((el,i) => el.classList.toggle('selected', i===acSelected)); }
  else if (e.key === 'Enter') {
    if (acSelected >= 0 && items[acSelected]) items[acSelected].dispatchEvent(new MouseEvent('mousedown'));
    else doSearch();
  } else if (e.key === 'Escape') acList.style.display = 'none';
});

document.addEventListener('click', e => {
  if (!document.getElementById('inputWrap').contains(e.target)) acList.style.display = 'none';
});

function selectPatientById(id) {
  const p = PATIENTS.find(x => x.id === id);
  if (!p) return;
  searchInput.value = p.name;
  acList.style.display = 'none';
  clearBtn.style.display = 'block';
  showResult(p);
}

function clearSearch() {
  searchInput.value = '';
  clearBtn.style.display = 'none';
  acList.style.display = 'none';
  document.getElementById('resultArea').innerHTML = `<div class="hint-text"><div class="hint-icon">🔍</div><div>พิมพ์ชื่อผู้ป่วยเพื่อค้นหาข้อมูล</div></div>`;
  searchInput.focus();
}

function doSearch() {
  acList.style.display = 'none';
  const q = searchInput.value.trim();
  if (!q) return;
  const matches = PATIENTS.filter(p => p.name.includes(q));
  const area = document.getElementById('resultArea');
  if (!matches.length) {
    area.innerHTML = `<div class="no-result"><div class="no-result-icon">🔍</div><h3>ไม่พบข้อมูลผู้ป่วย</h3><p>ลองใช้ชื่อหรือนามสกุลอื่น</p></div>`;
    return;
  }
  if (matches.length === 1) { showResult(matches[0]); return; }
  area.innerHTML = `
    <div style="margin-bottom:14px;font-size:14px;color:#64748b">พบ <b style="color:#0f766e">${matches.length}</b> รายการ — กรุณาเลือกผู้ป่วย</div>
    ${matches.map(p => {
      const imgs = getPatientImages(p);
      return `
      <div onclick="showResult(PATIENTS.find(x=>x.id===${p.id}))" style="background:white;border-radius:12px;padding:14px 18px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(13,148,136,0.08);border:1px solid rgba(13,148,136,0.08);transition:all 0.15s" onmouseover="this.style.borderColor='#14b8a6'" onmouseout="this.style.borderColor='rgba(13,148,136,0.08)'">
        <div class="ac-avatar">${getFirstChar(p.name)}</div>
        <div style="flex:1"><div style="font-weight:600;color:#1e293b">${p.name}</div>${p.phone ? `<div style="font-size:13px;color:#64748b;margin-top:3px">📞 ${p.phone}</div>` : ''}</div>
        ${imgs.length ? `<div class="ac-imgs">📷 ${imgs.length} รูป</div>` : '<div style="font-size:12px;color:#94a3b8">ไม่มีรูป</div>'}
      </div>`}).join('')}`;
}

function showResult(patient) {
  acList.style.display = 'none';
  const area = document.getElementById('resultArea');
  const images = getPatientImages(patient);
  area.innerHTML = `
    <div class="result-card">
      <div class="patient-header">
        <div class="patient-avatar">${getFirstChar(patient.name)}</div>
        <div style="flex:1">
          <div class="patient-name">${patient.name}</div>
          <div class="patient-phone">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.78a16 16 0 0 0 6.29 6.29l1.65-1.65a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            ${patient.phone || 'ไม่มีเบอร์โทร'}
          </div>
        </div>
        <div class="img-count-badge"><span class="num">${images.length}</span>รูป</div>
      </div>
      <div class="images-section">
        <div class="section-title">📋 รูปเวชระเบียน</div>
        ${!apiReady
          ? '<div style="text-align:center;padding:36px;color:#64748b"><div class="img-spinner" style="margin:0 auto 10px"></div>กำลังโหลดข้อมูลจาก Drive...</div>'
          : images.length === 0
            ? '<div style="text-align:center;padding:36px;color:#64748b">📂 ไม่มีรูปเวชระเบียนใน Drive</div>'
            : `<div class="image-grid" id="imgGrid_${patient.id}">${images.map((img, i) => `
                <div class="img-item" id="imgCell_${patient.id}_${i}" onclick="openImg('${img}')">
                  <span class="img-label">${img.startsWith('draw') ? '✏️' : '📷'} ${i+1}</span>
                  <div class="img-loading"><div class="img-spinner"></div><div>กำลังโหลด...</div></div>
                  <div class="img-overlay"><span>🔍 เปิดใน Drive</span></div>
                </div>`).join('')}
              </div>
              <div style="text-align:center;margin-top:16px">
                <button class="open-drive-btn" onclick="openDriveFolder()">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                  เปิดโฟลเดอร์บน Google Drive
                </button>
              </div>`
        }
      </div>
    </div>`;

  if (apiReady && images.length > 0) {
    loadImagesForPatient(patient, images);
  } else if (!apiReady && patient._pendingShow !== true) {
    // Wait for API then re-render
    patient._pendingShow = true;
    waitForApiThenShow(patient);
  }
}

async function waitForApiThenShow(patient) {
  let waited = 0;
  while (!apiReady && waited < 8000) {
    await new Promise(r => setTimeout(r, 300));
    waited += 300;
  }
  patient._pendingShow = false;
  showResult(patient);
}

async function loadImagesForPatient(patient, images) {
  images.forEach((img, i) => {
    const cell = document.getElementById(`imgCell_${patient.id}_${i}`);
    if (!cell) return;
    const thumbUrl = getDriveThumbnailUrl(img);
    if (thumbUrl) {
      const image = new Image();
      image.onload = () => {
        cell.querySelector('.img-loading').style.display = 'none';
        const imgEl = document.createElement('img');
        imgEl.src = thumbUrl;
        imgEl.alt = img;
        cell.insertBefore(imgEl, cell.querySelector('.img-overlay'));
      };
      image.onerror = () => {
        cell.querySelector('.img-loading').innerHTML = `<div class="img-error-box">🖼️<br><small>${img}</small></div>`;
      };
      image.src = thumbUrl;
    } else {
      cell.querySelector('.img-loading').innerHTML = `<div class="img-error-box">🖼️<br><small style="word-break:break-all">${img}</small></div>`;
    }
  });
}

function openImg(filename) {
  const url = getDriveViewUrl(filename);
  if (url) {
    window.open(url, '_blank');
  } else {
    openDriveFolder();
  }
}

function openDriveFolder() {
  window.open(`https://drive.google.com/drive/folders/${FOLDER_ID}`, '_blank');
}

// ─── Database Update Feature ───────────────────────────────────────────────

let pendingNewPatients = []; // rows waiting to be confirmed

function triggerDbBrowse() {
  document.getElementById('dbFileInput').value = '';
  document.getElementById('dbFileInput').click();
}

function handleDbFile(input) {
  const file = input.files[0];
  if (!file) return;

  const confirmBtn = document.getElementById('dbConfirmBtn');
  const filenameEl = document.getElementById('dbFilename');
  pendingNewPatients = [];
  confirmBtn.style.display = 'none';
  filenameEl.textContent = '';

  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const arr = new Uint8Array(e.target.result);
      let newPatients;
      try {
        showToast('⏳ กำลังอ่านไฟล์ .db...');
        newPatients = await parseSQLitePatients(arr);
        if (!newPatients || newPatients.length === 0) {
          showToast('❌ ไม่พบข้อมูลผู้ป่วยในไฟล์ .db');
          return;
        }
      } catch(sqlErr) {
        showToast('❌ ไม่สามารถอ่านไฟล์ .db: ' + sqlErr.message);
        return;
      }

      // Find truly new patients (skip if id already exists)
      const existingIds = new Set(PATIENTS.map(p => p.id));
      pendingNewPatients = newPatients.filter(p => !existingIds.has(p.id));

      if (pendingNewPatients.length === 0) {
        showToast('✅ ไม่มีข้อมูลใหม่ — ทุกรายการมีอยู่ในระบบแล้ว');
        return;
      }

      filenameEl.textContent = `+${pendingNewPatients.length} ราย`;
      confirmBtn.style.display = 'flex';
      showToast(`📂 พบ ${pendingNewPatients.length} รายการใหม่ กด "ยืนยันอัปเดต" เพื่อเพิ่มเข้าระบบ`);
    } catch(err) {
      showToast('❌ เกิดข้อผิดพลาด: ' + err.message);
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

async function confirmDbUpdate() {
  if (!pendingNewPatients.length) return;

  // Merge into PATIENTS array
  pendingNewPatients.forEach(p => PATIENTS.push(p));

  // Re-sort by id
  PATIENTS.sort((a, b) => a.id - b.id);

  const count = pendingNewPatients.length;
  pendingNewPatients = [];

  // Update badge
  document.getElementById('totalBadge').textContent = PATIENTS.length + ' ราย';

  // Hide confirm button
  document.getElementById('dbConfirmBtn').style.display = 'none';
  document.getElementById('dbFilename').textContent = '';

  // บันทึกลง Gist
  showToast('⏳ กำลังบันทึกขึ้น GitHub Gist...');
  try {
    await savePatientsToStorage();
    showToast(`✅ บันทึก ${count} รายใหม่ขึ้น Gist เรียบร้อย — ทุกเครื่องจะเห็นข้อมูลนี้`);
  } catch(e) {
    showToast('❌ บันทึกลง Gist ไม่สำเร็จ: ' + e.message);
  }
}


function setupToken() {
  openTokenModal();
}

function showToast(msg) {
  const toast = document.getElementById('dbToast');
  toast.textContent = msg;
  toast.style.display = 'block';
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => { toast.style.display = 'none'; }, 4000);
}

// Uses the real SQLite engine for reliable parsing of all records.

// sql.js is loaded from CDN; parseSQLitePatients uses it via initSqlJs
let _sqlJsPromise = null;
function getSqlJs() {
  if (!_sqlJsPromise) {
    _sqlJsPromise = new Promise((resolve, reject) => {
      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.min.js';
      script.onload = () => {
        initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}` })
          .then(resolve).catch(reject);
      };
      script.onerror = reject;
      document.head.appendChild(script);
    });
  }
  return _sqlJsPromise;
}

async function parseSQLitePatients(uint8) {
  const SQL = await getSqlJs();
  const db = new SQL.Database(uint8);
  
  // Find a table with id and name columns
  const tables = db.exec("SELECT name FROM sqlite_master WHERE type='table'");
  if (!tables.length || !tables[0].values.length) { db.close(); return []; }
  
  let patients = [];
  for (const [tblName] of tables[0].values) {
    try {
      const result = db.exec(`SELECT id, name, phone FROM \`${tblName}\` WHERE id IS NOT NULL AND name IS NOT NULL AND name != ''`);
      if (result.length && result[0].values.length) {
        patients = result[0].values.map(([id, name, phone]) => ({
          id: Number(id),
          name: String(name || ''),
          phone: String(phone || '')
        })).filter(p => p.id && p.name);
        break;
      }
    } catch(e) { /* column doesn't exist, try next table */ }
  }
  db.close();
  return patients;
