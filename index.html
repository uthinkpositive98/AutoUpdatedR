<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบค้นหาเวชระเบียน</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<style>
  :root {
    --teal: #0d9488; --teal-light: #14b8a6; --teal-dark: #0f766e;
    --mint: #ccfbf1; --slate: #1e293b; --slate-soft: #64748b;
    --gray-light: #f1f5f9; --gray-border: #e2e8f0; --white: #ffffff;
    --amber: #f59e0b; --amber-light: #fbbf24; --amber-dark: #d97706;
    --red: #dc2626; --red-light: #ef4444;
    --green: #16a34a; --green-light: #22c55e;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.07); --shadow-md: 0 4px 16px rgba(13,148,136,0.10);
    --shadow-lg: 0 10px 40px rgba(13,148,136,0.15); --radius: 16px; --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', sans-serif; background: linear-gradient(135deg, #f0fdf9, #e6f7f5, #f0fdf4); min-height: 100vh; color: var(--slate); }
  header {
    background: linear-gradient(135deg, var(--teal-dark), var(--teal), var(--teal-light));
    padding: 20px 32px; display: flex; align-items: center; gap: 14px;
    box-shadow: 0 4px 24px rgba(13,148,136,0.25); position: relative; overflow: hidden; flex-wrap: wrap;
  }
  header::before { content:''; position:absolute; top:-40px; right:-40px; width:200px; height:200px; border-radius:50%; background:rgba(255,255,255,0.07); }
  .header-icon { width:48px; height:48px; background:rgba(255,255,255,0.18); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
  .header-text h1 { color:white; font-size:20px; font-weight:700; }
  .header-text p { color:rgba(255,255,255,0.78); font-size:12px; margin-top:2px; }
  .header-actions { margin-left:auto; display:flex; align-items:center; gap:8px; flex-wrap:wrap; z-index:1; }
  .header-badge { background:rgba(255,255,255,0.18); color:white; border-radius:20px; padding:6px 14px; font-size:13px; font-weight:500; border:1px solid rgba(255,255,255,0.2); }
  .hbtn { border:none; border-radius:20px; padding:7px 14px; font-size:13px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px; font-family:inherit; transition:all 0.15s; white-space:nowrap; }
  .hbtn:hover { transform:translateY(-1px); }
  .hbtn-confirm { background:var(--amber); color:white; box-shadow:0 2px 8px rgba(245,158,11,0.4); }
  .hbtn-confirm:hover { background:var(--amber-dark); }
  .hbtn-confirm.disabled { background:rgba(255,255,255,0.18); color:rgba(255,255,255,0.5); cursor:not-allowed; box-shadow:none; }
  .hbtn-confirm.disabled:hover { transform:none; }
  .hbtn-update { background:rgba(255,255,255,0.95); color:var(--teal-dark); }
  .hbtn-token { background:rgba(255,255,255,0.95); color:var(--amber-dark); }
  .api-status { font-size:12px; padding:5px 12px; border-radius:16px; }
  .api-loading { background:rgba(255,200,0,0.2); color:#fde68a; }
  .api-ok { background:rgba(0,255,128,0.15); color:#6ee7b7; }
  .api-err { background:rgba(255,100,100,0.2); color:#fca5a5; }
  main { max-width:860px; margin:0 auto; padding:36px 24px 60px; }
  .search-card { background:var(--white); border-radius:var(--radius); padding:30px 28px 24px; box-shadow:var(--shadow-md); margin-bottom:28px; border:1px solid rgba(13,148,136,0.08); }
  .search-label { font-size:13px; font-weight:600; color:var(--teal-dark); margin-bottom:10px; letter-spacing:0.4px; text-transform:uppercase; display:flex; align-items:center; gap:7px; }
  .search-row { display:flex; gap:12px; align-items:flex-start; }
  .input-wrap { flex:1; position:relative; }
  .input-wrap input { width:100%; padding:13px 18px 13px 44px; border:2px solid var(--gray-border); border-radius:var(--radius-sm); font-family:inherit; font-size:16px; color:var(--slate); background:var(--gray-light); transition:all 0.2s; outline:none; }
  .input-wrap input:focus { border-color:var(--teal); background:white; box-shadow:0 0 0 4px rgba(13,148,136,0.10); }
  .input-wrap input::placeholder { color:#94a3b8; }
  .input-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--teal); font-size:18px; pointer-events:none; }
  .clear-btn { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:#94a3b8; cursor:pointer; font-size:16px; padding:4px; display:none; }
  .clear-btn:hover { color:var(--slate); }
  .search-btn { padding:13px 26px; background:linear-gradient(135deg, var(--teal), var(--teal-light)); color:white; border:none; border-radius:var(--radius-sm); font-family:inherit; font-size:15px; font-weight:600; cursor:pointer; transition:all 0.2s; white-space:nowrap; box-shadow:0 4px 12px rgba(13,148,136,0.3); display:flex; align-items:center; gap:8px; }
  .search-btn:hover { transform:translateY(-1px); box-shadow:0 6px 18px rgba(13,148,136,0.4); }
  .autocomplete-list { position:absolute; top:calc(100% + 6px); left:0; right:0; background:white; border-radius:var(--radius-sm); box-shadow:var(--shadow-lg); border:1px solid var(--gray-border); z-index:100; overflow:hidden; max-height:260px; overflow-y:auto; animation:dropIn 0.15s ease; }
  @keyframes dropIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .autocomplete-list::-webkit-scrollbar { width:6px; }
  .autocomplete-list::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px; }
  .ac-item { display:flex; align-items:center; gap:12px; padding:11px 16px; cursor:pointer; transition:background 0.12s; border-bottom:1px solid #f1f5f9; }
  .ac-item:last-child { border-bottom:none; }
  .ac-item:hover, .ac-item.selected { background:var(--mint); }
  .ac-avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg, var(--teal), var(--teal-light)); color:white; display:flex; align-items:center; justify-content:center; font-weight:600; flex-shrink:0; }
  .ac-name { font-size:14px; font-weight:500; color:var(--slate); }
  .ac-phone { font-size:12px; color:var(--slate-soft); margin-top:2px; }
  .ac-imgs { margin-left:auto; font-size:12px; color:var(--teal); background:var(--mint); padding:3px 9px; border-radius:10px; font-weight:500; }
  .hint-text { text-align:center; padding:60px 20px; color:var(--slate-soft); }
  .hint-icon { font-size:48px; margin-bottom:14px; opacity:0.5; }
  .no-result { text-align:center; padding:60px 20px; color:var(--slate-soft); }
  .no-result-icon { font-size:48px; margin-bottom:14px; opacity:0.5; }
  .no-result h3 { font-weight:600; color:var(--slate); margin-bottom:6px; }
  .result-card { background:white; border-radius:var(--radius); padding:28px; box-shadow:var(--shadow-md); border:1px solid rgba(13,148,136,0.08); }
  .patient-header { display:flex; align-items:center; gap:18px; margin-bottom:22px; padding-bottom:20px; border-bottom:1px solid var(--gray-border); }
  .patient-avatar { width:64px; height:64px; border-radius:50%; background:linear-gradient(135deg, var(--teal), var(--teal-light)); color:white; display:flex; align-items:center; justify-content:center; font-size:26px; font-weight:600; flex-shrink:0; box-shadow:0 4px 12px rgba(13,148,136,0.3); }
  .patient-name { font-size:20px; font-weight:700; color:var(--slate); }
  .patient-phone { font-size:14px; color:var(--slate-soft); margin-top:4px; display:flex; align-items:center; gap:6px; }
  .img-count-badge { background:var(--mint); color:var(--teal-dark); padding:8px 14px; border-radius:12px; font-size:13px; font-weight:600; display:flex; flex-direction:column; align-items:center; }
  .img-count-badge .num { font-size:20px; line-height:1; }
  .images-section { margin-top:6px; }
  .section-title { font-size:14px; font-weight:600; color:var(--slate); margin-bottom:14px; }
  .image-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(170px, 1fr)); gap:14px; }
  .img-item { aspect-ratio:1; border-radius:var(--radius-sm); overflow:hidden; background:var(--gray-light); position:relative; cursor:pointer; transition:all 0.2s; border:1px solid var(--gray-border); }
  .img-item:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); border-color:var(--teal-light); }
  .img-item img { width:100%; height:100%; object-fit:cover; }
  .img-loading { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--slate-soft); font-size:13px; gap:8px; }
  .img-spinner { width:24px; height:24px; border:3px solid var(--gray-border); border-top-color:var(--teal); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .img-label { position:absolute; top:8px; left:8px; background:rgba(0,0,0,0.6); color:white; padding:3px 8px; border-radius:6px; font-size:11px; z-index:2; }
  .img-overlay { position:absolute; inset:0; background:linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.7)); display:flex; align-items:flex-end; padding:10px; opacity:0; transition:opacity 0.2s; }
  .img-item:hover .img-overlay { opacity:1; }
  .img-overlay span { color:white; font-size:12px; font-weight:500; }
  .img-error-box { color:#94a3b8; font-size:12px; padding:10px; }
  .open-drive-btn { background:white; color:var(--teal-dark); border:2px solid var(--teal); padding:10px 22px; border-radius:var(--radius-sm); font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:8px; transition:all 0.2s; }
  .open-drive-btn:hover { background:var(--teal); color:white; }
  /* Bottom toast for new entries */
  .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#1e293b; color:white; padding:14px 22px; border-radius:14px; box-shadow:0 8px 30px rgba(0,0,0,0.3); font-size:14px; display:flex; align-items:center; gap:10px; z-index:200; max-width:90vw; }
  /* Modal */
  .modal-backdrop { position:fixed; inset:0; background:rgba(15,23,42,0.65); display:flex; align-items:center; justify-content:center; z-index:1000; padding:20px; backdrop-filter:blur(4px); }
  .modal { background:white; border-radius:18px; padding:28px; width:100%; max-width:520px; box-shadow:0 20px 60px rgba(0,0,0,0.3); max-height:90vh; overflow-y:auto; }
  .modal h2 { font-size:19px; font-weight:700; color:var(--slate); margin-bottom:6px; display:flex; align-items:center; gap:10px; }
  .modal-sub { font-size:13px; color:var(--slate-soft); margin-bottom:18px; line-height:1.5; }
  .modal label { display:block; font-size:12px; font-weight:600; color:var(--slate); margin-bottom:6px; margin-top:14px; text-transform:uppercase; letter-spacing:0.5px; }
  .modal input, .modal textarea { width:100%; padding:10px 14px; border:2px solid var(--gray-border); border-radius:10px; font-family:inherit; font-size:14px; outline:none; transition:border 0.15s; }
  .modal input:focus, .modal textarea:focus { border-color:var(--teal); }
  .modal textarea { resize:vertical; min-height:60px; font-family:'Courier New', monospace; font-size:12px; }
  .modal-actions { margin-top:22px; display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap; }
  .mbtn { padding:10px 20px; border-radius:10px; border:none; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.15s; }
  .mbtn-cancel { background:var(--gray-light); color:var(--slate); }
  .mbtn-cancel:hover { background:var(--gray-border); }
  .mbtn-primary { background:linear-gradient(135deg, var(--teal), var(--teal-light)); color:white; box-shadow:0 4px 12px rgba(13,148,136,0.3); }
  .mbtn-primary:hover { transform:translateY(-1px); }
  .mbtn-primary:disabled { background:#cbd5e1; cursor:not-allowed; transform:none; box-shadow:none; }
  .mbtn-danger { background:var(--red); color:white; }
  .info-box { background:#fef3c7; border:1px solid #fde68a; color:#92400e; padding:12px 14px; border-radius:10px; font-size:12.5px; margin-top:14px; line-height:1.5; }
  .info-box.success { background:#dcfce7; border-color:#bbf7d0; color:#166534; }
  .info-box.error { background:#fee2e2; border-color:#fecaca; color:#991b1b; }
  .new-list { background:var(--gray-light); border-radius:10px; padding:12px 14px; margin-top:8px; max-height:220px; overflow-y:auto; }
  .new-row { display:flex; align-items:center; gap:8px; padding:6px 0; font-size:13px; border-bottom:1px dashed var(--gray-border); }
  .new-row:last-child { border:none; }
  .new-row .pid { background:var(--mint); color:var(--teal-dark); padding:2px 7px; border-radius:5px; font-size:11px; font-weight:600; min-width:46px; text-align:center; }
  .new-row .pname { flex:1; }
  .new-row input { padding:5px 9px; font-size:12px; border:1px solid var(--gray-border); border-radius:6px; flex:2; min-width:0; }
  @media (max-width:640px) {
    header { padding:16px 18px; }
    .header-text h1 { font-size:17px; }
    .header-text p { font-size:11px; }
    .header-actions { width:100%; margin-left:0; margin-top:6px; }
    .search-row { flex-direction:column; }
    .search-btn { width:100%; justify-content:center; }
  }
</style>
</head>
<body>

<header>
  <div class="header-icon">🦷</div>
  <div class="header-text">
    <h1>ระบบค้นหาเวชระเบียน</h1>
    <p>ค้นหาข้อมูลผู้ป่วยและรูปลายมือแพทย์</p>
  </div>
  <div class="header-actions">
    <div class="header-badge" id="totalBadge">— ราย</div>
    <button class="hbtn hbtn-confirm disabled" id="confirmBtn" onclick="openConfirmModal()" style="display:none">
      ✓ ยืนยันอัปเดต <span id="confirmCount"></span>
    </button>
    <button class="hbtn hbtn-update" onclick="document.getElementById('dbFileInput').click()">
      ⬆️ อัปเดตฐานข้อมูล
    </button>
    <button class="hbtn hbtn-update" onclick="reloadAll()" title="รีเฟรชจาก GitHub" style="padding:7px 10px">
      🔄
    </button>
    <input type="file" id="dbFileInput" accept=".db,.sqlite,.sqlite3" style="display:none" onchange="handleDbFile(event)">
    <button class="hbtn hbtn-token" onclick="openTokenModal()">
      🔑 Token
    </button>
    <div class="api-status api-loading" id="apiStatus">⏳ กำลังเชื่อมต่อ Drive...</div>
  </div>
</header>

<main>
  <div class="search-card">
    <div class="search-label">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      ค้นหาผู้ป่วย
    </div>
    <div class="search-row">
      <div class="input-wrap" id="inputWrap">
        <span class="input-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </span>
        <input type="text" id="searchInput" placeholder="พิมพ์ชื่อผู้ป่วย..." autocomplete="off" spellcheck="false">
        <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
        <div class="autocomplete-list" id="acList" style="display:none"></div>
      </div>
      <button class="search-btn" onclick="doSearch()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        ค้นหา
      </button>
    </div>
  </div>
  <div id="resultArea">
    <div class="hint-text"><div class="hint-icon">🔍</div><div>พิมพ์ชื่อผู้ป่วยเพื่อค้นหาข้อมูล</div></div>
  </div>
</main>

<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script>
// ====================== CONFIG ======================
const API_KEY = 'AIzaSyBDPixvfXlBweG3EZ_W_VS2K3i6CunUXDk';
const FOLDER_ID = '1yHENN4f6hyif9Rg2QT0kdk4wsWlw9Gbl';

// GitHub repo config — ใช้สำหรับเขียนกลับ patients.json
// แก้ตรงนี้ให้ตรงกับ repo ของคุณ
const GITHUB_OWNER = 'uthinkpositive98';   // <-- ชื่อ user/org บน GitHub
const GITHUB_REPO = 'AutoUpdatedR';        // <-- ชื่อ repo
const GITHUB_BRANCH = 'main';                 // <-- branch ที่ Vercel ใช้
const PATIENTS_FILE_PATH = 'patients.json';   // <-- path ของไฟล์ใน repo

// ====================== STATE ======================
let PATIENTS = [];                      // รายชื่อผู้ป่วยทั้งหมด (โหลดจาก patients.json)
let patientsFileSha = null;              // SHA ของไฟล์ patients.json บน GitHub (ใช้ตอน commit)
let fileMap = {};                        // filename -> Drive file ID
let patientImages = {};                  // patient_id -> [filenames]
let apiReady = false;
let newPatientIds = [];                  // ID ที่เจอใน Drive แต่ยังไม่อยู่ใน PATIENTS

// ====================== TOKEN MGMT ======================
const TOKEN_KEY = 'gh_token_v1';
function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }
function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }
function clearToken() { localStorage.removeItem(TOKEN_KEY); }
function hasToken() { return getToken().length > 0; }

// ====================== HELPERS ======================
function parsePatientId(filename) {
  const m = filename.match(/^(?:img|draw)_(\d+)_/);
  return m ? parseInt(m[1]) : null;
}

function getFirstChar(name) {
  const clean = name.replace(/^(นาย|นาง|น\.ส\.|นางสาว|ด\.ช\.|ด\.ญ\.|เด็กหญิง|เด็กชาย|Miss|Mr\.|Mrs\.)\s*/, '');
  return clean.charAt(0) || name.charAt(0);
}

function showToast(html, persist=false) {
  const root = document.getElementById('toastRoot');
  root.innerHTML = `<div class="toast">${html}</div>`;
  if (!persist) setTimeout(() => { if (root.firstChild) root.firstChild.remove(); }, 4500);
}

function clearToast() {
  document.getElementById('toastRoot').innerHTML = '';
}

// ====================== LOAD PATIENTS FROM patients.json ======================
async function loadPatients() {
  try {
    // เพิ่ม cache-buster เพื่อให้ได้ไฟล์ล่าสุดเสมอ (เพราะ Vercel cache ค่อนข้างนาน)
    const res = await fetch('patients.json?t=' + Date.now());
    if (!res.ok) throw new Error('โหลด patients.json ไม่ได้: ' + res.status);
    PATIENTS = await res.json();
    document.getElementById('totalBadge').textContent = PATIENTS.length + ' ราย';
  } catch(e) {
    console.error(e);
    document.getElementById('totalBadge').textContent = '⚠️ โหลดไม่ได้';
    PATIENTS = [];
  }
}

// ====================== LOAD DRIVE FILES ======================
async function loadDriveFiles() {
  const status = document.getElementById('apiStatus');
  status.className = 'api-status api-loading';
  status.textContent = '⏳ กำลังเชื่อมต่อ Drive...';
  let allFiles = [];
  let pageToken = '';
  fileMap = {};
  patientImages = {};
  try {
    do {
      const url = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent("'" + FOLDER_ID + "' in parents")}&fields=nextPageToken,files(id,name)&pageSize=1000${pageToken ? '&pageToken=' + pageToken : ''}&key=${API_KEY}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('API error ' + res.status);
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      (data.files || []).forEach(f => {
        fileMap[f.name] = f.id;
        const pid = parsePatientId(f.name);
        if (pid !== null) {
          if (!patientImages[pid]) patientImages[pid] = [];
          patientImages[pid].push(f.name);
        }
      });
      allFiles.push(...(data.files || []));
      pageToken = data.nextPageToken || '';
    } while (pageToken);

    for (const pid in patientImages) patientImages[pid].sort();

    apiReady = true;
    status.className = 'api-status api-ok';
    status.textContent = `✅ พร้อม (${allFiles.length} ไฟล์)`;

    detectNewPatients();
  } catch(e) {
    status.className = 'api-status api-err';
    status.textContent = '❌ Drive: ' + e.message;
    console.error(e);
  }
}

// ====================== DETECT NEW PATIENT IDs ======================
function detectNewPatients() {
  const existingIds = new Set(PATIENTS.map(p => p.id));
  const driveIds = Object.keys(patientImages).map(Number);
  newPatientIds = driveIds.filter(id => !existingIds.has(id)).sort((a,b) => a-b);

  const btn = document.getElementById('confirmBtn');
  const cnt = document.getElementById('confirmCount');
  if (newPatientIds.length > 0) {
    btn.style.display = 'inline-flex';
    btn.classList.remove('disabled');
    cnt.textContent = `+${newPatientIds.length} ราย`;
    showToast(`📂 พบ ${newPatientIds.length} รายการใหม่ กด "ยืนยันอัปเดต" เพื่อเพิ่มเข้าระบบ`, true);
  } else {
    btn.style.display = 'none';
    clearToast();
  }
}

// ====================== RELOAD ======================
async function reloadAll() {
  clearToast();

// ====================== DB FILE UPLOAD ======================
let pendingDbPatients = null;  // ข้อมูลที่อ่านจาก .db รอ confirm

async function handleDbFile(event) {
  const file = event.target.files[0];
  event.target.value = ''; // reset เพื่อให้เลือกไฟล์เดิมซ้ำได้
  if (!file) return;

  if (!hasToken()) {
    alert('กรุณาเพิ่ม GitHub Token ก่อน (กดปุ่ม 🔑 Token)');
    openTokenModal();
    return;
  }

  // แสดง modal โหลด
  document.getElementById('modalRoot').innerHTML = `
    <div class="modal-backdrop">
      <div class="modal" style="max-width:480px;text-align:center">
        <h2 style="justify-content:center">⏳ กำลังอ่านไฟล์ฐานข้อมูล</h2>
        <p class="modal-sub" id="dbStatus">กำลังโหลด SQL.js engine...</p>
        <div class="img-spinner" style="margin:20px auto"></div>
      </div>
    </div>
  `;

  try {
    const setStatus = (t) => { const el = document.getElementById('dbStatus'); if (el) el.textContent = t; };

    setStatus('กำลังโหลด SQL.js engine...');
    const SQL = await initSqlJs({
      locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}`
    });

    setStatus('กำลังอ่านไฟล์ ' + file.name + '...');
    const buf = await file.arrayBuffer();
    const db = new SQL.Database(new Uint8Array(buf));

    // ตรวจว่ามี table patients ไหม
    setStatus('กำลังตรวจสอบโครงสร้าง...');
    const tableCheck = db.exec("SELECT name FROM sqlite_master WHERE type='table' AND name='patients'");
    if (tableCheck.length === 0) {
      throw new Error('ไม่พบ table "patients" ในไฟล์นี้ — ตรวจสอบว่าเป็นไฟล์ dental_records.db ที่ถูกต้อง');
    }

    // ตรวจว่ามี column ที่ต้องใช้ไหม
    const colCheck = db.exec("PRAGMA table_info(patients)");
    const cols = colCheck[0].values.map(r => r[1]);
    const required = ['id', 'name', 'phone'];
    const missing = required.filter(c => !cols.includes(c));
    if (missing.length) throw new Error('Table "patients" ขาด column: ' + missing.join(', '));

    // Query เอาแค่ 3 fields ที่ต้องใช้ (id, name, phone) — ไม่ดึงข้อมูลละเอียดอื่น ๆ
    setStatus('กำลังดึงข้อมูลผู้ป่วย...');
    const result = db.exec("SELECT id, name, phone FROM patients ORDER BY id");
    db.close();

    if (result.length === 0 || result[0].values.length === 0) {
      throw new Error('ไม่พบข้อมูลผู้ป่วยในตาราง');
    }

    const newPatients = result[0].values.map(row => ({
      id: row[0],
      name: (row[1] || '').replace(/\s{2,}/g, ' ').trim(),
      phone: (row[2] || '').trim()
    })).filter(p => p.name); // ตัดที่ name ว่าง

    pendingDbPatients = newPatients;
    showDbConfirmModal(file.name, newPatients);

  } catch(e) {
    console.error(e);
    document.getElementById('modalRoot').innerHTML = `
      <div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
        <div class="modal" style="max-width:480px">
          <h2>❌ อ่านไฟล์ไม่สำเร็จ</h2>
          <div class="info-box error">${e.message}</div>
          <div class="modal-actions">
            <button class="mbtn mbtn-cancel" onclick="closeModal()">ปิด</button>
          </div>
        </div>
      </div>
    `;
  }
}

async function commitDbPatients() {
  if (!pendingDbPatients) return;
  const additions = pendingDbPatients;
  const btn = document.getElementById('dbCommitBtn');
  btn.disabled = true;
  btn.textContent = 'กำลัง commit...';

  // เพิ่ม status box
  let info = document.querySelector('.modal .info-box');
  info.className = 'info-box';
  info.innerHTML = '⏳ กำลังดึงไฟล์ปัจจุบันจาก GitHub...';

  try {
    // 1. ดึง SHA ของไฟล์ปัจจุบัน
    const getRes = await fetch(
      `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${PATIENTS_FILE_PATH}?ref=${GITHUB_BRANCH}`,
      { headers: { 'Authorization': 'Bearer ' + getToken(), 'Accept': 'application/vnd.github+json' } }
    );

    let sha = null;
    if (getRes.ok) {
      const fd = await getRes.json();
      sha = fd.sha;
    } else if (getRes.status !== 404) {
      const err = await getRes.json().catch(() => ({}));
      throw new Error(`ดึงไฟล์ไม่ได้ (${getRes.status}): ${err.message || getRes.statusText}`);
    }
    // ถ้า 404 = ไฟล์ยังไม่มี → สร้างใหม่ (sha=null)

    // 2. encode + commit
    info.innerHTML = '⏳ กำลัง commit เข้า GitHub...';
    const newContent = JSON.stringify(additions, null, 2);
    const newContentB64 = btoa(unescape(encodeURIComponent(newContent)));
    const commitMsg = `Replace patients.json from .db upload (${additions.length} patients)`;

    const body = {
      message: commitMsg,
      content: newContentB64,
      branch: GITHUB_BRANCH
    };
    if (sha) body.sha = sha;

    const putRes = await fetch(
      `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${PATIENTS_FILE_PATH}`,
      {
        method: 'PUT',
        headers: {
          'Authorization': 'Bearer ' + getToken(),
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      }
    );

    if (!putRes.ok) {
      const err = await putRes.json().catch(() => ({}));
      throw new Error(`Commit ไม่สำเร็จ (${putRes.status}): ${err.message || putRes.statusText}`);
    }
    const result = await putRes.json();

    // 3. update local state ทันที
    PATIENTS = additions;
    pendingDbPatients = null;
    document.getElementById('totalBadge').textContent = PATIENTS.length + ' ราย';
    detectNewPatients();

    info.className = 'info-box success';
    info.innerHTML = `
      ✅ <b>รีเพลสสำเร็จ!</b><br>
      📊 ${additions.length} ราย<br>
      📌 SHA: <code>${result.commit.sha.substring(0,7)}</code><br>
      🚀 Vercel กำลัง re-deploy... (~30-60 วินาที)<br>
      <a href="${result.commit.html_url}" target="_blank" style="color:#166534;text-decoration:underline">ดู commit บน GitHub →</a>
    `;
    btn.textContent = 'เสร็จสิ้น';
    btn.disabled = false;
    btn.onclick = closeModal;
    showToast(`✅ อัปเดตฐานข้อมูล ${additions.length} ราย`);

  } catch(e) {
    console.error(e);
    info.className = 'info-box error';
    info.innerHTML = `❌ <b>เกิดข้อผิดพลาด:</b><br>${e.message}<br><br>
      <small>ตรวจสอบ:<br>
      • Token ถูกต้อง และยังไม่หมดอายุ<br>
      • Token มี permission <code>Contents: Read and write</code><br>
      • ชื่อ repo (${GITHUB_OWNER}/${GITHUB_REPO}) ถูกต้อง</small>`;
    btn.disabled = false;
    btn.textContent = 'ลองใหม่';
  }
}

function saveTokenFromModal() {
  const v = document.getElementById('tokenInput').value.trim();
  if (!v) { alert('กรุณากรอก Token'); return; }
  if (!/^(ghp_|github_pat_)/.test(v)) {
    if (!confirm('Token ไม่ขึ้นต้นด้วย ghp_ หรือ github_pat_ — บันทึกต่อ?')) return;
  }
  setToken(v);
  closeModal();
  showToast('✅ บันทึก Token แล้ว');
}

async function commitNewPatients() {
  const inputs = document.querySelectorAll('.modal .newname');
  const phones = document.querySelectorAll('.modal .newphone');
  const additions = [];
  inputs.forEach((inp, idx) => {
    const pid = parseInt(inp.dataset.pid);
    const name = inp.value.trim();
    const phone = phones[idx].value.trim();
    if (name) additions.push({ id: pid, name, phone });
  });

  if (additions.length === 0) {
    alert('กรอกชื่ออย่างน้อย 1 ราย หรือกดยกเลิก');
    return;
  }

  const btn = document.getElementById('commitBtn');
  const info = document.getElementById('commitInfo');
  btn.disabled = true;
  btn.textContent = 'กำลัง commit...';
  info.className = 'info-box';
  info.innerHTML = '⏳ กำลังดึงไฟล์ปัจจุบันจาก GitHub...';

  try {
    // 1. ดึงไฟล์ patients.json ปัจจุบันจาก GitHub (ต้องได้ SHA ล่าสุด)
    const getRes = await fetch(
      `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${PATIENTS_FILE_PATH}?ref=${GITHUB_BRANCH}`,
      { headers: { 'Authorization': 'Bearer ' + getToken(), 'Accept': 'application/vnd.github+json' } }
    );
    if (!getRes.ok) {
      const err = await getRes.json().catch(() => ({}));
      throw new Error(`ดึงไฟล์ไม่ได้ (${getRes.status}): ${err.message || getRes.statusText}`);
    }
    const fileData = await getRes.json();
    patientsFileSha = fileData.sha;

    // decode base64 -> array
    const currentJson = decodeURIComponent(escape(atob(fileData.content.replace(/\n/g, ''))));
    const currentArr = JSON.parse(currentJson);

    // 2. รวมข้อมูลใหม่ (กันซ้ำด้วย id)
    const existingIds = new Set(currentArr.map(p => p.id));
    const merged = [...currentArr];
    additions.forEach(a => {
      if (!existingIds.has(a.id)) merged.push(a);
    });
    merged.sort((a, b) => a.id - b.id);

    // 3. encode และ commit
    info.innerHTML = '⏳ กำลัง commit เข้า GitHub...';
    const newContent = JSON.stringify(merged, null, 2);
    const newContentB64 = btoa(unescape(encodeURIComponent(newContent)));
    const commitMsg = `Add ${additions.length} new patient(s): ${additions.map(a => '#'+a.id).join(', ')}`;

    const putRes = await fetch(
      `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${PATIENTS_FILE_PATH}`,
      {
        method: 'PUT',
        headers: {
          'Authorization': 'Bearer ' + getToken(),
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: commitMsg,
          content: newContentB64,
          sha: patientsFileSha,
          branch: GITHUB_BRANCH
        })
      }
    );

    if (!putRes.ok) {
      const err = await putRes.json().catch(() => ({}));
      throw new Error(`Commit ไม่สำเร็จ (${putRes.status}): ${err.message || putRes.statusText}`);
    }

    const result = await putRes.json();

    // 4. update local state ทันที (ไม่ต้องรอ Vercel)
    PATIENTS = merged;
    document.getElementById('totalBadge').textContent = PATIENTS.length + ' ราย';
    detectNewPatients();

    info.className = 'info-box success';
    info.innerHTML = `
      ✅ <b>Commit สำเร็จ!</b><br>
      📌 SHA: <code>${result.commit.sha.substring(0,7)}</code><br>
      🚀 Vercel กำลัง re-deploy... (~30-60 วินาที)<br>
      <a href="${result.commit.html_url}" target="_blank" style="color:#166534;text-decoration:underline">ดู commit บน GitHub →</a>
    `;
    btn.textContent = 'เสร็จสิ้น';
    btn.disabled = false;
    btn.onclick = closeModal;
    showToast(`✅ เพิ่มผู้ป่วยใหม่ ${additions.length} ราย commit เข้า GitHub แล้ว`);

  } catch(e) {
    console.error(e);
    info.className = 'info-box error';
    info.innerHTML = `❌ <b>เกิดข้อผิดพลาด:</b><br>${e.message}<br><br>
      <small>ตรวจสอบ:<br>
      • Token ถูกต้อง และยังไม่หมดอายุ<br>
      • Token มี permission <code>Contents: Read and write</code><br>
      • ชื่อ repo (${GITHUB_OWNER}/${GITHUB_REPO}) ถูกต้อง</small>`;
    btn.disabled = false;
    btn.textContent = 'ลองใหม่';
  }
}

// ====================== AUTOCOMPLETE & SEARCH ======================
const searchInput = document.getElementById('searchInput');
const acList = document.getElementById('acList');
const clearBtn = document.getElementById('clearBtn');
let acSelected = -1;

function getPatientImages(patient) { return patientImages[patient.id] || []; }
function getDriveViewUrl(filename) { const id = fileMap[filename]; return id ? `https://drive.google.com/file/d/${id}/view` : null; }
function getDriveThumbnailUrl(filename) { const id = fileMap[filename]; return id ? `https://www.googleapis.com/drive/v3/files/${id}?alt=media&key=${API_KEY}` : null; }

searchInput.addEventListener('input', function() {
  const val = this.value.trim();
  clearBtn.style.display = val ? 'block' : 'none';
  if (val.length < 1) { acList.style.display = 'none'; return; }
  const matches = PATIENTS.filter(p => p.name.includes(val)).slice(0, 8);
  if (!matches.length) { acList.style.display = 'none'; return; }
  acSelected = -1;
  acList.innerHTML = matches.map((p, i) => {
    const imgs = getPatientImages(p);
    return `
    <div class="ac-item" data-id="${p.id}" onmousedown="selectPatientById(${p.id})">
      <div class="ac-avatar">${getFirstChar(p.name)}</div>
      <div>
        <div class="ac-name">${highlight(p.name, val)}</div>
        ${p.phone ? `<div class="ac-phone">📞 ${p.phone}</div>` : ''}
      </div>
      ${imgs.length ? `<div class="ac-imgs">📷 ${imgs.length}</div>` : ''}
    </div>`;
  }).join('');
  acList.style.display = 'block';
});

function highlight(text, q) {
  const i = text.indexOf(q);
  if (i < 0) return text;
  return text.slice(0,i) + `<mark style="background:#ccfbf1;color:#0f766e;border-radius:3px;padding:0 2px">${text.slice(i, i+q.length)}</mark>` + text.slice(i+q.length);
}

searchInput.addEventListener('keydown', function(e) {
  const items = acList.querySelectorAll('.ac-item');
  if (e.key === 'ArrowDown') { e.preventDefault(); acSelected = Math.min(acSelected+1, items.length-1); items.forEach((el,i) => el.classList.toggle('selected', i===acSelected)); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); acSelected = Math.max(acSelected-1, -1); items.forEach((el,i) => el.classList.toggle('selected', i===acSelected)); }
  else if (e.key === 'Enter') {
    if (acSelected >= 0 && items[acSelected]) items[acSelected].dispatchEvent(new MouseEvent('mousedown'));
    else doSearch();
  } else if (e.key === 'Escape') acList.style.display = 'none';
});

document.addEventListener('click', e => {
  if (!document.getElementById('inputWrap').contains(e.target)) acList.style.display = 'none';
});

function selectPatientById(id) {
  const p = PATIENTS.find(x => x.id === id);
  if (!p) return;
  searchInput.value = p.name;
  acList.style.display = 'none';
  clearBtn.style.display = 'block';
  showResult(p);
}

function clearSearch() {
  searchInput.value = '';
  clearBtn.style.display = 'none';
  acList.style.display = 'none';
  document.getElementById('resultArea').innerHTML = `<div class="hint-text"><div class="hint-icon">🔍</div><div>พิมพ์ชื่อผู้ป่วยเพื่อค้นหาข้อมูล</div></div>`;
  searchInput.focus();
}

function doSearch() {
  acList.style.display = 'none';
  const q = searchInput.value.trim();
  if (!q) return;
  const matches = PATIENTS.filter(p => p.name.includes(q));
  const area = document.getElementById('resultArea');
  if (!matches.length) {
    area.innerHTML = `<div class="no-result"><div class="no-result-icon">🔍</div><h3>ไม่พบข้อมูลผู้ป่วย</h3><p>ลองใช้ชื่อหรือนามสกุลอื่น</p></div>`;
    return;
  }
  if (matches.length === 1) { showResult(matches[0]); return; }
  area.innerHTML = `
    <div style="margin-bottom:14px;font-size:14px;color:#64748b">พบ <b style="color:#0f766e">${matches.length}</b> รายการ — กรุณาเลือกผู้ป่วย</div>
    ${matches.map(p => {
      const imgs = getPatientImages(p);
      return `
      <div onclick="showResult(PATIENTS.find(x=>x.id===${p.id}))" style="background:white;border-radius:12px;padding:14px 18px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(13,148,136,0.08);border:1px solid rgba(13,148,136,0.08);transition:all 0.15s" onmouseover="this.style.borderColor='#14b8a6'" onmouseout="this.style.borderColor='rgba(13,148,136,0.08)'">
        <div class="ac-avatar">${getFirstChar(p.name)}</div>
        <div style="flex:1"><div style="font-weight:600;color:#1e293b">${p.name}</div>${p.phone ? `<div style="font-size:13px;color:#64748b;margin-top:3px">📞 ${p.phone}</div>` : ''}</div>
        ${imgs.length ? `<div class="ac-imgs">📷 ${imgs.length} รูป</div>` : '<div style="font-size:12px;color:#94a3b8">ไม่มีรูป</div>'}
      </div>`}).join('')}`;
}

function showResult(patient) {
  acList.style.display = 'none';
  const area = document.getElementById('resultArea');
  const images = getPatientImages(patient);
  area.innerHTML = `
    <div class="result-card">
      <div class="patient-header">
        <div class="patient-avatar">${getFirstChar(patient.name)}</div>
        <div style="flex:1">
          <div class="patient-name">${patient.name}</div>
          <div class="patient-phone">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.78a16 16 0 0 0 6.29 6.29l1.65-1.65a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            ${patient.phone || 'ไม่มีเบอร์โทร'}
          </div>
        </div>
        <div class="img-count-badge"><span class="num">${images.length}</span>รูป</div>
      </div>
      <div class="images-section">
        <div class="section-title">📋 รูปเวชระเบียน</div>
        ${!apiReady
          ? '<div style="text-align:center;padding:36px;color:#64748b"><div class="img-spinner" style="margin:0 auto 10px"></div>กำลังโหลดข้อมูลจาก Drive...</div>'
          : images.length === 0
            ? '<div style="text-align:center;padding:36px;color:#64748b">📂 ไม่มีรูปเวชระเบียนใน Drive</div>'
            : `<div class="image-grid" id="imgGrid_${patient.id}">${images.map((img, i) => `
                <div class="img-item" id="imgCell_${patient.id}_${i}" onclick="openImg('${img}')">
                  <span class="img-label">${img.startsWith('draw') ? '✏️' : '📷'} ${i+1}</span>
                  <div class="img-loading"><div class="img-spinner"></div><div>กำลังโหลด...</div></div>
                  <div class="img-overlay"><span>🔍 เปิดใน Drive</span></div>
                </div>`).join('')}
              </div>
              <div style="text-align:center;margin-top:16px">
                <button class="open-drive-btn" onclick="openDriveFolder()">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                  เปิดโฟลเดอร์บน Google Drive
                </button>
              </div>`
        }
      </div>
    </div>`;

  if (apiReady && images.length > 0) loadImagesForPatient(patient, images);
  else if (!apiReady && patient._pendingShow !== true) {
    patient._pendingShow = true;
    waitForApiThenShow(patient);
  }
}

async function waitForApiThenShow(patient) {
  let waited = 0;
  while (!apiReady && waited < 8000) { await new Promise(r => setTimeout(r, 300)); waited += 300; }
  patient._pendingShow = false;
  showResult(patient);
}

async function loadImagesForPatient(patient, images) {
  images.forEach((img, i) => {
    const cell = document.getElementById(`imgCell_${patient.id}_${i}`);
    if (!cell) return;
    const thumbUrl = getDriveThumbnailUrl(img);
    if (thumbUrl) {
      const image = new Image();
      image.onload = () => {
        cell.querySelector('.img-loading').style.display = 'none';
        const imgEl = document.createElement('img');
        imgEl.src = thumbUrl; imgEl.alt = img;
        cell.insertBefore(imgEl, cell.querySelector('.img-overlay'));
      };
      image.onerror = () => {
        cell.querySelector('.img-loading').innerHTML = `<div class="img-error-box">🖼️<br><small>${img}</small></div>`;
      };
      image.src = thumbUrl;
    } else {
      cell.querySelector('.img-loading').innerHTML = `<div class="img-error-box">🖼️<br><small style="word-break:break-all">${img}</small></div>`;
    }
  });
}

function openImg(filename) {
  const url = getDriveViewUrl(filename);
  if (url) window.open(url, '_blank'); else openDriveFolder();
}

function openDriveFolder() {
  window.open(`https://drive.google.com/drive/folders/${FOLDER_ID}`, '_blank');
}

// ====================== INIT ======================
(async function init() {
  await loadPatients();
  await loadDriveFiles();
})();
</script>
</body>
</html>
